    <div class="section">
        <h2>Start a Project</h2>
        <div class="card" style="display: block;">
            <p>Ready to take your business online? Send me a message.</p>
            <form style="display: flex; flex-direction: column; gap: 10px;">

                <input type="email" placeholder="Your Email" style="padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;">
                <textarea placeholder="Tell me about your project..." rows="4" style="padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white;"></textarea>

            </form>
        </div>
